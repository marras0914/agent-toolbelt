startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - AGENT_TOOLBELT_KEY
    properties:
      AGENT_TOOLBELT_KEY:
        type: string
        description: "Agent Toolbelt API key. Get a free key (1,000 calls/month, no credit card) at https://www.agenttoolbelt.live/api/clients/register"
  commandFunction: |-
    (config) => ({
      command: "npx",
      args: ["-y", "agent-toolbelt-mcp"],
      env: { AGENT_TOOLBELT_KEY: config.AGENT_TOOLBELT_KEY }
    })

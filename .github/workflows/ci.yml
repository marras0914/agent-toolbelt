name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: "22"

jobs:
  # ============================================
  # Job 1: Lint, type-check, and test
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test:ci
        env:
          NODE_ENV: test

      - name: Build
        run: npm run build

      - name: Smoke test — server starts
        run: |
          API_KEY_SECRET=ci-test-secret \
          DATABASE_PATH=./data/ci-test.db \
          NODE_ENV=test \
          PORT=3333 \
          node dist/index.js &
          sleep 3

          # Health check
          curl -sf http://localhost:3333/api | grep -q "operational"
          echo "✓ Health check passed"

          # Catalog check
          curl -sf http://localhost:3333/api/tools/catalog | grep -q "schema-generator"
          echo "✓ Tool catalog working"

          # Registration + tool call
          RESULT=$(curl -sf -X POST http://localhost:3333/api/clients/register \
            -H "Content-Type: application/json" \
            -d '{"email": "ci@test.com"}')
          KEY=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['apiKey']['key'])")

          curl -sf -X POST http://localhost:3333/api/tools/token-counter \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $KEY" \
            -d '{"text": "hello world", "models": ["gpt-4o"]}' | grep -q '"success":true'
          echo "✓ Tool execution working"

          kill %1 || true

  # ============================================
  # Job 2: Build and push Docker image
  # ============================================
  docker:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

